<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>歌曲下载</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div class="container">
        <!-- 设置卡片 -->
        <div class="card">
            <div class="card-header">
                <span class="material-symbols-outlined">settings</span>
                下载设置
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label class="form-label">路径模板</label>
                    <input type="text" class="text-field" id="tpl" placeholder="{artist}-{album}/{title}" aria-label="路径模板">
                    <div class="form-hint">支持: {title} {artist} {album} {year} {genre}</div>
                </div>                <div class="form-group">
                    <label class="form-label">批量下载间隔（秒）</label>
                    <input type="number" class="text-field" id="interval" min="0" step="1" placeholder="0" aria-label="批量下载间隔">
                    <div class="form-hint">0 表示无间隔（默认），建议 1-5 秒以减少服务器负载</div>
                </div>                <div class="switch-row">
                    <div class="switch-row-label">
                        <span class="switch-row-title">嵌入元数据</span>
                        <span class="switch-row-subtitle">写入标题/艺术家/封面等到音频文件标签</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="embed" checked aria-label="嵌入元数据">
                        <span class="switch-slider"></span>
                    </label>
                </div>
                <div class="switch-row">
                    <div class="switch-row-label">
                        <span class="switch-row-title">播放时自动下载</span>
                        <span class="switch-row-subtitle">播放网络歌曲时自动保存到本地（仅限插件来源歌曲）</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="auto-dl" aria-label="播放时自动下载">
                        <span class="switch-slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <!-- 下载进度 -->
        <div class="card dl-progress" id="progress">
            <div class="card-body">
                <div class="prog-header">
                    <span class="prog-label">批量下载中...</span>
                    <span id="prog-num" class="prog-num">0/0</span>
                </div>
                <div class="progress-linear">
                    <div class="progress-linear-fill" id="prog-bar"></div>
                </div>
                <div class="prog-stats">
                    <span>成功: <span id="prog-ok" class="status-ok">0</span></span>
                    <span>失败: <span id="prog-fail" class="status-fail">0</span></span>
                </div>
            </div>
        </div>

        <!-- 歌曲列表 -->
        <div class="card">
            <div class="toolbar">
                <button class="btn-outlined btn-sm" id="btn-sel-all">全选</button>
                <button class="btn-outlined btn-sm" id="btn-refresh">
                    <span class="material-symbols-outlined">refresh</span>
                    刷新
                </button>
                <div style="flex:1"></div>
                <span class="toolbar-info" id="sel-info">已选 0 首</span>
                <button class="btn-filled btn-sm" id="btn-dl" disabled>
                    <span class="material-symbols-outlined">download</span>
                    下载选中
                </button>
            </div>
            <div class="table-wrap" style="max-height:calc(100vh - 380px);overflow-y:auto">
                <table aria-label="下载列表">
                    <thead>
                        <tr>
                            <th style="width:36px"><input type="checkbox" class="cb" id="cb-all" aria-label="全选"></th>
                            <th>标题</th>
                            <th>艺术家</th>
                            <th>专辑</th>
                            <th>来源</th>
                            <th style="width:60px">状态</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
                <div class="empty-state" id="empty">
                    <span class="material-symbols-outlined">cloud_off</span>
                    <p>没有可下载的网络歌曲</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Snackbar -->
    <div id="snackbar" class="snackbar"></div>

    <script src="static/js/app.js"></script>
</body>
</html>
